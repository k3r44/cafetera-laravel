<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Tempus Coffee - Panel de Control</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --gold: #c97b2c; --gold-light: #e8a84a;
      --bg-dark: #110d08; --cream: #f5ede0;
    }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg-dark); color: var(--cream);
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center; overflow: hidden;
      touch-action: manipulation;
    }

    #particle-canvas { position: fixed; inset: 0; z-index: 150; pointer-events: none; }
    .ambient { position: fixed; inset: 0; pointer-events: none; z-index: 0; background: radial-gradient(ellipse 60% 50% at 50% 60%, rgba(201,123,44,0.1) 0%, transparent 70%); }

    /* BARRA DE USUARIO */
    .user-bar {
      position: absolute; top: 20px; right: 20px; display: flex; align-items: center; gap: 12px;
      background: rgba(255,255,255,0.05); padding: 8px 16px; border-radius: 50px;
      border: 1px solid rgba(201,123,44,0.2); backdrop-filter: blur(10px); z-index: 160;
      transform: translateY(-100px); transition: 0.5s ease;
    }
    .user-bar.visible { transform: translateY(0); }
    .user-avatar { width: 32px; height: 32px; background: var(--gold); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; color: white; font-size: 0.8rem; }
    .btn-logout { background: transparent; border: none; color: var(--gold-light); font-size: 0.7rem; cursor: pointer; text-decoration: underline; }

    /* LOGIN */
    #login-screen { position: fixed; inset: 0; z-index: 180; background: #110d08; display: flex; align-items: center; justify-content: center; transition: 0.5s; }
    #login-screen.hidden { opacity: 0; visibility: hidden; }
    .login-card { width: min(380px, 90%); background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 24px; padding: 40px; text-align: center; backdrop-filter: blur(10px); }
    .field-input { width: 100%; padding: 12px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; color: white; margin-top: 5px; outline: none; }

    /* APP PRINCIPAL */
    #app { position: relative; z-index: 10; display: none; width: 100%; max-width: 1200px; text-align: center; padding: 20px; }
    #app.visible { display: flex; flex-direction: column; align-items: center; }

    /* CARRUSEL ESTRUCTURA */
    .carousel-container { position: relative; width: 100%; display: flex; align-items: center; justify-content: center; margin: 20px 0; }
    .carousel-stage { position: relative; width: 100%; height: 350px; overflow: hidden; display: flex; align-items: center; justify-content: center; perspective: 1000px; }
    .carousel-track { position: relative; width: 220px; height: 300px; transform-style: preserve-3d; transition: transform 0.5s cubic-bezier(0.23, 1, 0.32, 1); }
    
    .drink-card {
      position: absolute; inset: 0; border-radius: 20px; cursor: pointer;
      display: flex; flex-direction: column; align-items: center; justify-content: flex-end;
      padding-bottom: 20px; transition: 0.6s cubic-bezier(0.4, 0, 0.2, 1);
      backface-visibility: hidden;
    }
    .card-img { width: 160px; height: 160px; border-radius: 50%; object-fit: cover; margin-bottom: 40px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
    .drink-name { font-family: 'Playfair Display', serif; font-size: 1.5rem; text-shadow: 0 2px 10px rgba(0,0,0,0.8); }

    /* FLECHAS DE NAVEGACIÓN */
    .btn-nav {
      position: absolute; top: 50%; transform: translateY(-50%);
      width: 50px; height: 50px; border-radius: 50%;
      background: rgba(201, 123, 44, 0.15); border: 1px solid var(--gold);
      color: var(--gold); font-size: 1.5rem; cursor: pointer;
      z-index: 170; display: flex; align-items: center; justify-content: center;
      transition: 0.3s; backdrop-filter: blur(5px);
    }
    .btn-nav:hover { background: var(--gold); color: white; }
    .btn-nav.left { left: 10px; }
    .btn-nav.right { right: 10px; }

    /* BOTÓN PREPARAR */
    .btn-gold {
      width: 260px; padding: 18px; background: var(--gold); color: white;
      border: none; border-radius: 50px; font-weight: 600; cursor: pointer;
      box-shadow: 0 8px 20px rgba(201,123,44,0.3); transition: 0.3s;
      z-index: 170; position: relative;
    }
    .btn-gold:active { transform: scale(0.95); }

    .footer-credits { margin-top: 25px; font-size: 0.65rem; color: rgba(245, 237, 224, 0.4); text-transform: uppercase; letter-spacing: 1px; }
    .footer-credits a { color: var(--gold-light); text-decoration: none; }
  </style>
</head>
<body>

  <div class="ambient"></div>
  <canvas id="particle-canvas"></canvas>

  <div id="user-bar" class="user-bar">
    <div id="user-initials" class="user-avatar">--</div>
    <div style="text-align: left">
      <span id="user-name-display" style="display:block; font-size:0.8rem">Usuario</span>
      <button class="btn-logout" onclick="logout()">Cerrar Sesión</button>
    </div>
  </div>

  <div id="login-screen">
    <form class="login-card" id="login-form" onsubmit="event.preventDefault(); doLogin();">
      <img src="assets/img/logo/tempus-logo.png" style="width:70px; margin-bottom:15px">
      <h2 style="font-family:'Playfair Display'; color:var(--gold); margin-bottom:20px">Bienvenido</h2>
      <input class="field-input" type="text" id="login-user" placeholder="Ej: BrewLover">
      <input class="field-input" type="password" id="login-pass" placeholder="Contraseña" style="margin-bottom:20px">
      <p id="login-error" style="color:#ff6b6b; font-size:0.8rem; margin-bottom:10px"></p>
      <button type="submit" class="btn-gold" style="width:100%">INGRESAR</button>
    </form>
  </div>

  <div id="app">
    <img src="assets/img/logo/tempus-logo.png" style="width: 50px; margin-bottom: 5px;">
    <h1 style="font-family: 'Playfair Display'; font-size: 1.8rem; margin-bottom: 5px;">Tempus Coffee</h1>
    
    <div class="carousel-container">
      <button class="btn-nav left" onclick="prevDrink()">&#10094;</button>
      
      <div class="carousel-stage" id="touch-zone">
        <div class="carousel-track" id="track"></div>
      </div>
      
      <button class="btn-nav right" onclick="nextDrink()">&#10095;</button>
    </div>

    <button class="btn-gold" id="btn-order" onclick="pedirBebida()">PREPARAR AHORA</button>
    <p id="status" style="margin-top:15px; color:var(--gold-light); font-size:0.9rem">Desliza para elegir</p>
    
    <div class="footer-credits">
      <p>© Tempus Coffee 2024</p>
      <p>© Designed by <a href="https://www.freepik.com" target="_blank">Freepik</a></p>
    </div>
  </div>

  <script>
    
    const API_BASE = "//192.168.0.101:8000/api/v1"; 

    const DRINKS = [
      { name: 'Americano', api: 'Americano', img: 'assets/drinks/americano.jpg' },
      { name: 'Con Leche', api: 'Americano con Leche', img: 'assets/drinks/Americano con leche.png' },
      { name: 'Mocha Latte', api: 'Mocha latte', img: 'assets/drinks/Mocha latte.png' },
      { name: 'Cocoa', api: 'Cocoa', img: 'assets/drinks/cocoa.png' }
    ];

    let current = 0;
    let token = localStorage.getItem('coffee_token');

    // --- LÓGICA DE CARRUSEL CIRCULAR ---
    function updateCarousel() {
      const cards = document.querySelectorAll('.drink-card');
      const total = DRINKS.length;

      cards.forEach((card, i) => {
        // Cálculo matemático para carrusel circular
        let offset = i - current;
        
        // Ajuste para que los elementos den la vuelta (circular)
        if (offset > total / 2) offset -= total;
        if (offset < -total / 2) offset += total;

        const isCenter = offset === 0;
        const opacity = isCenter ? 1 : (Math.abs(offset) > 1 ? 0 : 0.3);
        const scale = isCenter ? 1 : 0.6;
        const rotate = offset * 15; // Un poco de rotación 3D
        
        card.style.transform = `translateX(${offset * 120}%) scale(${scale}) rotateY(${rotate}deg)`;
        card.style.opacity = opacity;
        card.style.zIndex = isCenter ? 100 : 10;
        card.style.pointerEvents = isCenter ? "auto" : "none";
      });

      document.getElementById('status').textContent = `${DRINKS[current].name} listo para preparar`;
    }

    function nextDrink() {
      current = (current + 1) % DRINKS.length;
      updateCarousel();
    }

    function prevDrink() {
      current = (current - 1 + DRINKS.length) % DRINKS.length;
      updateCarousel();
    }

    // --- SOPORTE TOUCH (SWIPE) ---
    let touchStartX = 0;
    const touchZone = document.getElementById('touch-zone');

    touchZone.addEventListener('touchstart', e => { touchStartX = e.changedTouches[0].screenX; }, false);
    touchZone.addEventListener('touchend', e => {
      let touchEndX = e.changedTouches[0].screenX;
      let diff = touchStartX - touchEndX;
      if (Math.abs(diff) > 50) { // Umbral de 50px
        if (diff > 0) nextDrink();
        else prevDrink();
      }
    }, false);

    // --- LOGIN Y API ---
    async function doLogin() {
      const user = document.getElementById('login-user').value;
      const pass = document.getElementById('login-pass').value;
      const err = document.getElementById('login-error');
      try {
        const res = await fetch(`${API_BASE}/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username: user, password: pass })
        });
        const data = await res.json();
        if (res.ok) {
          token = data.token;
          localStorage.setItem('coffee_token', token);
          localStorage.setItem('user_name', data.user);
          showApp(data.user);
        } else { err.textContent = data.message; }
      } catch (e) { err.textContent = "Error de conexión"; }
    }

    function showApp(name) {
      document.getElementById('user-name-display').textContent = name;
      document.getElementById('user-initials').textContent = name.substring(0,2).toUpperCase();
      document.getElementById('login-screen').classList.add('hidden');
      document.getElementById('app').style.display = 'flex';
      setTimeout(() => {
        document.getElementById('app').classList.add('visible');
        document.getElementById('user-bar').classList.add('visible');
        buildCarousel();
      }, 100);
    }

    function buildCarousel() {
      const track = document.getElementById('track');
      track.innerHTML = "";
      DRINKS.forEach((d, i) => {
        const card = document.createElement('div');
        card.className = 'drink-card';
        card.innerHTML = `<img src="${d.img}" class="card-img"><span class="drink-name">${d.name}</span>`;
        track.appendChild(card);
      });
      updateCarousel();
    }

    async function pedirBebida() {
      const status = document.getElementById('status');
      status.textContent = "Enviando orden...";
      try {
        const res = await fetch(`${API_BASE}/pedir`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
          body: JSON.stringify({ metodo: DRINKS[current].api })
        });
        if (res.ok) {
          status.textContent = "✅ ¡Preparando!";
          window.speechSynthesis.speak(new SpeechSynthesisUtterance("Preparando " + DRINKS[current].name));
        } else { status.textContent = "❌ Error"; }
      } catch (e) { status.textContent = "❌ Error conexión"; }
    }

    function logout() { localStorage.clear(); location.reload(); }

    // --- PARTÍCULAS (IDÉNTICAS AL ANTERIOR) ---
    const canvas = document.getElementById('particle-canvas');
    const ctx = canvas.getContext('2d');
    let W, H, particles = [];
    function initParticles() {
      W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight;
      particles = [];
      for (let i = 0; i < 60; i++) {
        particles.push({ x: Math.random() * W, y: Math.random() * H, vx: (Math.random() - 0.5) * 0.3, vy: (Math.random() - 0.5) * 0.3, r: Math.random() * 1.5 });
      }
      tick();
    }
    function tick() {
      ctx.clearRect(0, 0, W, H);
      particles.forEach(p => {
        p.x += p.vx; p.y += p.vy;
        if (p.x < 0) p.x = W; if (p.x > W) p.x = 0;
        if (p.y < 0) p.y = H; if (p.y > H) p.y = 0;
        ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fillStyle = "rgba(201, 123, 44, 0.4)"; ctx.fill();
      });
      requestAnimationFrame(tick);
    }

    window.onload = () => {
      initParticles();
      if(token && localStorage.getItem('user_name')) showApp(localStorage.getItem('user_name'));
    };
  </script>
</body>
</html>
